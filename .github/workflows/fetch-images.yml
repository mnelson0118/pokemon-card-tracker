name: Fetch Pokemon Card Images

on:
  push:
    paths:
      - 'pokemon-data.csv'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # Runs every night at 3am UTC

jobs:
  fetch-images:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run image fetch script
        run: python scripts/fetch_images.py

      - name: Commit and push updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop
          git add pokemon-data.csv
          git diff --cached --quiet || git commit -m "chore: update imageUrl and marketPrice [skip ci]"
          git push
