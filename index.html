<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Card Tracker</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'%3E%3Crect width='16' height='16' fill='%23DC143C' rx='2'/%3E%3Crect x='1' y='1' width='14' height='6' fill='%23A0102C' rx='1'/%3E%3Crect x='0' y='7' width='16' height='1' fill='%236B0A1D'/%3E%3Ccircle cx='5' cy='4' r='2.5' fill='%233B82F6'/%3E%3Ccircle cx='5' cy='4' r='1.5' fill='%2360A5FA'/%3E%3Ccircle cx='5' cy='3.5' r='0.5' fill='%23fff' opacity='0.7'/%3E%3Ccircle cx='10' cy='2' r='0.7' fill='%2322C55E'/%3E%3Ccircle cx='12' cy='2' r='0.7' fill='%23FACC15'/%3E%3Ccircle cx='14' cy='2' r='0.7' fill='%2322C55E'/%3E%3Crect x='3' y='9' width='10' height='5' fill='%230F1729' rx='1'/%3E%3Crect x='4' y='10' width='8' height='3' fill='%231A1A2E' rx='0.5'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #DC143C;
            --red-dark: #A0102C;
            --red-deeper: #6B0A1D;
            --blue: #3B82F6;
            --blue-glow: #60A5FA;
            --yellow: #FACC15;
            --green: #22C55E;
            --bg: #1A1A2E;
            --surface: #16213E;
            --surface-light: #1E2D4D;
            --text: #E8E8F0;
            --text-dim: #8890A4;
            --border: #2A3A5C;
            --input-bg: #0F1729;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            height: 100%;
            background-color: var(--bg);
            background-attachment: fixed;
        }

        body {
            height: 100%;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-y: scroll;
            background-color: var(--bg);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 30px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .container { max-width: 100%; padding: 0 12px 16px; }
        }
        @media (max-width: 430px) {
            .container { padding: 0 10px 12px; }
        }

        /* Header - Pokédex Red Gradient */
        header {
            background: linear-gradient(135deg, var(--red-dark), var(--red-deeper));
            border-bottom: 3px solid var(--primary-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0;
            padding: 14px 24px;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        @media (min-width: 769px) {
            header {
                flex-wrap: nowrap;
                gap: 24px;
                padding: 16px 28px;
            }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            order: 1;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0;
        }

        .pokeball {
            width: 28px; height: 28px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        @media (min-width: 769px) {
            .pokeball { width: 32px; height: 32px; }
        }
        .pokeball svg { width: 100%; height: 100%; }

        /* Override pokeball SVG for dark theme */
        .pokeball-outer { fill: none; stroke: rgba(255,255,255,0.8); stroke-width: 2.5; }
        .pokeball-red { fill: var(--primary-red); }
        .pokeball-white { fill: rgba(255,255,255,0.9); }
        .pokeball-line { stroke: rgba(255,255,255,0.8); stroke-width: 2.5; }
        .pokeball-center-circle { fill: var(--red-deeper); stroke: rgba(255,255,255,0.8); stroke-width: 2.5; }
        .pokeball-center-dot { fill: rgba(255,255,255,0.9); }

        .logo-text h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            font-weight: 400;
            color: white;
            letter-spacing: 2px;
            line-height: 1.3;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
        }
        @media (min-width: 769px) {
            .logo-text h1 { font-size: 18px; }
        }

        .logo-text p {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: var(--yellow);
            font-weight: 400;
            letter-spacing: 1.5px;
            line-height: 1;
            margin-top: 4px;
        }
        @media (min-width: 769px) {
            .logo-text p { font-size: 10px; }
        }

        /* Dex indicator - pulsing blue light */
        .dex-indicator {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--blue);
            box-shadow: 0 0 12px var(--blue-glow), inset 0 -2px 4px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.2);
            animation: pulse-glow 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 12px var(--blue-glow); }
            50% { box-shadow: 0 0 24px var(--blue-glow), 0 0 48px rgba(96,165,250,0.3); }
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            align-items: center;
            margin-left: auto;
            order: 2;
        }
        @media (min-width: 769px) {
            .stats-container {
                display: flex;
                gap: 24px;
                grid-template-columns: unset;
            }
        }

        .stat {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: auto;
        }
        @media (min-width: 769px) {
            .stat { min-width: 60px; }
        }

        .stat-value {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            font-weight: 400;
            color: white;
            line-height: 1;
        }
        @media (min-width: 769px) {
            .stat-value { font-size: 15px; }
        }

        .stat-label {
            font-size: 8px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-top: 4px;
            white-space: nowrap;
        }
        @media (min-width: 769px) {
            .stat-label { font-size: 9px; }
        }

        .progress-section {
            display: none;
            align-items: center;
            gap: 8px;
            margin-left: 0;
            padding-left: 0;
            border-left: none;
            order: 3;
        }
        @media (min-width: 769px) {
            .progress-section {
                display: flex;
                gap: 10px;
                margin-left: 16px;
                padding-left: 16px;
                border-left: 1px solid rgba(255,255,255,0.15);
            }
        }

        .progress-label {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            white-space: nowrap;
        }
        .progress-bar {
            width: 80px; height: 4px;
            background-color: rgba(255,255,255,0.15);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--blue-glow));
            border-radius: 2px;
            transition: width var(--transition);
        }
        .progress-percent {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: var(--blue-glow);
            min-width: 28px;
            text-align: right;
        }

        /* Hide theme toggle - always dark */
        .theme-toggle { display: none !important; }

        /* Filter Section */
        .filter-toggle-section {
            margin-bottom: 20px;
        }

        .filter-toggle-btn {
            padding: 12px 18px;
            border: 2px solid var(--primary-red);
            background-color: transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-red);
            cursor: pointer;
            transition: all var(--transition);
            width: 100%;
            min-height: 48px;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .filter-toggle-btn:hover {
            background-color: var(--primary-red);
            color: white;
        }

        .filter-toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .filter-toggle {
            display: block;
            padding: 10px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background-color: var(--surface);
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 14px;
        }
        .filter-toggle:hover {
            border-color: var(--blue);
            color: var(--text);
        }
        .filter-toggle.active {
            background-color: var(--blue);
            color: white;
            border-color: var(--blue);
        }

        /* Search */
        .search-wrapper {
            padding: 20px;
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text);
            background-color: var(--input-bg);
            transition: all var(--transition);
            font-family: 'Outfit', sans-serif;
        }
        .search-input::placeholder { color: var(--text-dim); }
        .search-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .search-input-wrap { position: relative; flex: 1; }
        .search-input-wrap .search-input { width: 100%; padding-right: 38px; }
        .search-clear {
            display: none; position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%); width: 22px; height: 22px;
            border: none; background: var(--border); color: var(--text-dim);
            border-radius: 50%; font-size: 13px; line-height: 1; cursor: pointer;
            align-items: center; justify-content: center;
            transition: all var(--transition); padding: 0;
        }
        .search-clear:hover { background: var(--blue); color: white; }
        .search-clear.visible { display: flex; }

        .search-filter-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-filter-row .search-input { flex: 1; }

        .filter-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background-color: var(--surface-light);
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all var(--transition);
        }
        .filter-btn:hover { border-color: var(--blue); color: var(--text); }
        .filter-btn.active { border-color: var(--blue); color: var(--blue); }
        .filter-btn svg { fill: currentColor; }

        .filter-panel {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .filter-panel-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .filter-gen-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .filter-gen-btn {
            padding: 7px 14px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background-color: var(--surface);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Outfit', sans-serif;
        }
        .filter-gen-btn:hover { border-color: var(--blue); color: var(--text); }
        .filter-gen-btn.active {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }

        .filter-group { display: flex; flex-direction: column; gap: 12px; }
        .filter-group-label {
            font-size: 12px; font-weight: 800;
            color: var(--yellow); text-transform: uppercase; letter-spacing: 1px;
        }

        .filter-buttons { display: none; }
        .filter-button { display: none; }
        .filter-button:hover { display: none; }
        .filter-button.active { display: none; }
        .filter-button.active:hover { display: none; }
        .search-box:focus { outline: none; border-color: var(--blue); }

        .active-filter-banner {
            display: none; align-items: center; justify-content: center; gap: 10px;
            padding: 10px 20px; background: rgba(59, 130, 246, 0.1);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            font-size: 13px; color: var(--blue-glow); font-weight: 600;
            cursor: pointer; transition: all var(--transition);
        }
        .active-filter-banner:hover { background: rgba(59, 130, 246, 0.18); }
        .active-filter-banner.visible { display: flex; }
        .active-filter-banner .filter-tags { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: center; }
        .active-filter-banner .filter-tag {
            display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px;
            background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px; font-size: 12px; color: var(--blue-glow); font-weight: 600;
        }
        .active-filter-banner .clear-filters { font-size: 12px; color: var(--text-dim); text-decoration: underline; text-underline-offset: 2px; }
        .active-filter-banner:hover .clear-filters { color: var(--text); }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            padding: 20px;
        }
        @media (min-width: 500px) {
            .card-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
        }
        @media (min-width: 769px) {
            .card-grid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
        }
        @media (min-width: 1024px) {
            .card-grid { grid-template-columns: repeat(5, 1fr); gap: 18px; }
        }
        @media (min-width: 1400px) {
            .card-grid { grid-template-columns: repeat(6, 1fr); gap: 18px; }
        }

        .card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            box-shadow: 0 8px 32px rgba(59,130,246,0.15), 0 12px 32px rgba(0,0,0,0.2);
            transform: translateY(-4px);
            border-color: var(--blue);
        }

        .card-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 63 / 88;
            background-color: var(--input-bg);
            display: flex;
            align-items: center; justify-content: center;
            overflow: hidden;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: transform var(--transition);
            flex-shrink: 0;
        }
        .card-image-wrapper:hover { transform: scale(1.03); }

        .card-image {
            width: 100%; height: 100%;
            object-fit: contain;
            padding: 4px;
            transition: transform var(--transition);
            border-radius: 8px;
            image-rendering: auto;
            display: block !important;
        }
        .card:hover .card-image { transform: scale(1.05); }

        .card-image-sprite {
            width: 100%; height: 100%;
            object-fit: contain; object-position: center;
            transition: transform var(--transition), opacity var(--transition), filter var(--transition);
            border-radius: 8px;
            image-rendering: pixelated; image-rendering: -moz-crisp-edges; image-rendering: crisp-edges;
            display: block !important; padding: 16%;
            opacity: 0.55; filter: saturate(0.6) brightness(1.1); cursor: pointer;
        }
        .card:hover .card-image-sprite {
            transform: scale(1.1); opacity: 0.85;
            filter: saturate(1) brightness(1.15) drop-shadow(0 0 8px rgba(96, 165, 250, 0.4));
        }

        .card-image-placeholder {
            width: 100%; height: 100%;
            background: linear-gradient(180deg, var(--surface-light) 50%, var(--border) 50%);
            display: none;
            align-items: center; justify-content: center;
            border-radius: 4px;
            position: relative;
        }
        .card-image-placeholder[style*="display: flex"] { display: flex !important; }
        .card-image-placeholder::after {
            content: "⚪";
            font-size: 48px;
            color: var(--text-dim);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity var(--transition);
            backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; opacity: 1; }

        .modal-content {
            position: relative;
            width: 90%; max-width: 400px;
            height: auto; max-height: 90vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .modal-image-container {
            width: 100%;
            aspect-ratio: 63 / 88;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
        }
        .modal-image {
            width: 100%; height: 100%;
            object-fit: contain; border-radius: 8px; cursor: zoom-in;
            image-rendering: pixelated; image-rendering: -moz-crisp-edges; image-rendering: crisp-edges;
        }
        .modal-image.zoomed {
            cursor: zoom-out;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: contain;
            border-radius: 0;
            z-index: 1002;
            background: rgba(0,0,0,0.95);
        }

        .modal-close {
            position: fixed;
            top: 20px; right: 20px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 28px;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background var(--transition);
            z-index: 1003;
        }
        .modal-close:hover { background: rgba(255,255,255,0.25); }

        .modal-info {
            position: relative;
            margin-top: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 8px;
            z-index: 1001;
            text-align: center;
        }

        .modal-pricing {
            width: 100%;
            margin-top: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            z-index: 1001;
        }
        .modal-pricing-header {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: var(--yellow);
            padding: 10px 14px 6px;
            letter-spacing: 1px;
        }
        .modal-pricing-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
        }
        .modal-pricing-row:last-child { padding-bottom: 10px; }
        .modal-pricing-label { color: var(--text-dim); font-weight: 500; }
        .modal-pricing-value { color: var(--green); font-weight: 700; }
        .modal-pricing-value.na { color: var(--text-dim); font-weight: 400; font-style: italic; }
        .modal-pricing-empty {
            padding: 12px 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
        }

        .card-content {
            padding: 12px;
            display: flex; flex-direction: column;
            gap: 8px;
            flex: 0;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }
        .card-number {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: var(--text-dim);
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        .card-generation {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .card-set-name {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 8px;
            background: rgba(250, 204, 21, 0.12);
            border: 1px solid rgba(250, 204, 21, 0.25);
            border-radius: 10px;
            font-size: 9px;
            color: var(--yellow);
            font-weight: 600;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-nm-prices {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 4px;
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
        }
        .card-nm-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-nm-label { color: var(--text-dim); font-weight: 500; }
        .card-nm-value { color: var(--green); font-weight: 700; }
        .card-price { font-size: 11px; color: var(--green); font-weight: 700; margin-top: 4px; }
        .card-price-display {
            background-color: var(--green);
            color: #0A2E14;
            border: none; border-radius: 8px;
            padding: 6px 10px; font-size: 13px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            margin-left: 6px; flex-shrink: 0;
        }
        .card-title {

    <script>
        // One-time cache buster — clears old service workers and caches
        (function() {
            const CACHE_BUSTER_VERSION = 3;
            const lastBust = parseInt(localStorage.getItem('cache_bust_v') || '0');
            if (lastBust < CACHE_BUSTER_VERSION) {
                console.log('🧹 Busting old caches (v' + CACHE_BUSTER_VERSION + ')...');
                // Unregister all service workers
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(regs => {
                        regs.forEach(r => r.unregister());
                    });
                }
                // Delete all caches
                if ('caches' in window) {
                    caches.keys().then(names => {
                        Promise.all(names.map(n => caches.delete(n))).then(() => {
                            localStorage.setItem('cache_bust_v', String(CACHE_BUSTER_VERSION));
                            console.log('✅ Caches cleared — reloading');
                            location.reload();
                        });
                    });
                } else {
                    localStorage.setItem('cache_bust_v', String(CACHE_BUSTER_VERSION));
                }
            }
        })();
    </script>

        // Debounce: Wait for user to finish before executing
        function debounce(func, delay) {
            let timeoutId = null;
            return function(...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func.apply(this, args), delay);
            };
        }

        // Throttle: Execute at most once per delay
        function throttle(func, limit) {
            let inThrottle = false;
            return function(...args) {
                if (!inThrottle) {
                    func.apply(this, args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
            };
        }

        // Lazy load images with IntersectionObserver
        function setupLazyLoading() {
            if (!('IntersectionObserver' in window)) {
                // Fallback for older browsers
                document.querySelectorAll('img[data-src]').forEach(img => {
                    img.src = img.dataset.src;
                });
                return;
            }

            const imageObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        if (img.dataset.src) {
                            img.src = img.dataset.src;
                            img.removeAttribute('data-src');
                        }
                        imageObserver.unobserve(img);
                    }
                });
            }, {
                rootMargin: '100px'  // Start loading 100px before it enters view
            });

            document.querySelectorAll('img[data-src]').forEach(img => {
                imageObserver.observe(img);
            });
        }

        // Register Service Worker for offline support & caching
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                // Clear old caches on startup
                caches.keys().then(names => {
                    names.forEach(name => {
                        if (name.startsWith('pokedex-tracker')) caches.delete(name);
                    });
                });

                navigator.serviceWorker.register('data:application/javascript;base64,' + btoa(`
                    const CACHE_NAME = 'pokedex-tracker-v2';
                    
                    self.addEventListener('install', (e) => {
                        self.skipWaiting();
                    });
                    
                    self.addEventListener('activate', (e) => {
                        e.waitUntil(
                            caches.keys().then(names =>
                                Promise.all(names.filter(n => n !== CACHE_NAME).map(n => caches.delete(n)))
                            ).then(() => clients.claim())
                        );
                    });
                    
                    self.addEventListener('fetch', (e) => {
                        if (e.request.method !== 'GET') return;
                        
                        e.respondWith(
                            fetch(e.request)
                                .then(response => {
                                    if (!response || response.status !== 200) return response;
                                    const responseClone = response.clone();
                                    caches.open(CACHE_NAME).then(cache => {
                                        cache.put(e.request, responseClone);
                                    });
                                    return response;
                                })
                                .catch(() => {
                                    return caches.match(e.request);
                                })
                        );
                    });
                `)).catch(err => console.log('SW registration failed:', err));
            }
        }

        // IndexedDB setup for better storage
        const dbPromise = (() => {
            if (!('indexedDB' in window)) return Promise.resolve(null);
            
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('PokemonTrackerDB', 1);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    
                    if (!db.objectStoreNames.contains('cards')) {
                        const store = db.createObjectStore('cards', { keyPath: 'id' });
                        store.createIndex('generation', 'generation', { unique: false });
                        store.createIndex('collected', 'collected', { unique: false });
                        store.createIndex('name', 'name', { unique: false });
                    }
                };
            });
        })();

        // Save to IndexedDB (async, doesn't block UI)
        async function saveToIndexedDB(cards) {
            try {
                const db = await dbPromise;
                if (!db) return;  // IndexedDB not available
                
                const tx = db.transaction('cards', 'readwrite');
                const store = tx.objectStore('cards');
                
                cards.forEach(card => {
                    store.put(card);
                });
                
                await tx.complete;
            } catch (err) {
                console.log('IndexedDB save failed, using localStorage', err);
            }
        }

        // Load from IndexedDB
        async function loadFromIndexedDB() {
            try {
                const db = await dbPromise;
                if (!db) return null;
                
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('cards', 'readonly');
                    const store = tx.objectStore('cards');
                    const request = store.getAll();
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            } catch (err) {
                console.log('IndexedDB load failed', err);
                return null;
            }
        }

        async function loadPokemonDataFromCSV() {
            try {
                // Get the directory of the current page (works on both local and GitHub Pages)
                const pageDir = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) || '/';
                const csvPath = pageDir + '/pokemon-data.csv';
                
                console.log('📁 Loading CSV from:', csvPath);
                
                const response = await fetch(csvPath + '?v=' + Date.now());         
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const csvText = await response.text();
                
                // Parse CSV with proper line ending handling
                const lines = csvText.trim().split(/\r?\n/);
                const headerLine = lines[0];
                const headers = headerLine.split(',').map(h => h.trim());
                
                console.log('📊 CSV Headers:', headers);
                console.log('📊 Total CSV lines:', lines.length - 1);
                
                sampleData = lines.slice(1)
                    .filter(line => line.trim().length > 0)  // Skip empty lines
                    .map((line, index) => {
                        // Robust CSV parsing (handles quoted fields)
                        const values = [];
                        let current = '';
                        let inQuotes = false;
                        
                        for (let i = 0; i < line.length; i++) {
                            const char = line[i];
                            if (char === '"') {
                                inQuotes = !inQuotes;
                            } else if (char === ',' && !inQuotes) {
                                values.push(current.trim());
                                current = '';
                            } else {
                                current += char;
                            }
                        }
                        values.push(current.trim());
                        
                        // Map to object
                        const obj = {};
                        headers.forEach((header, i) => {
                            const value = values[i] || '';
                            // Convert types
                            if (header === 'id' || header === 'generation') {
                                obj[header] = parseInt(value) || null;
                            } else if (header === 'collected') {
                                obj[header] = value === 'true' || value === 'True' || value === '1';
                            } else if (header === 'price') {
                                obj[header] = value && value !== '' ? parseFloat(value) : null;
                            } else {
                                obj[header] = value || '';
                            }
                        });
                        
                        // Generate imageUrl if not provided
                        if (!obj.imageUrl || obj.imageUrl.trim() === '') {
                            if (obj.productId) {
                                // Use TCGPlayer CDN direct image URL pattern
                                obj.imageUrl = `https://tcgplayer-cdn.tcgplayer.com/product/${obj.productId}_in_1000x1000.jpg`;
                            }
                        }
                        
                        return obj;
                    });
                
                // Count how many have images
                const cardsWithImages = sampleData.filter(c => c.imageUrl && c.imageUrl.trim()).length;
                console.log(`\n✅ CSV LOADED SUCCESSFULLY`);
                console.log(`   Total cards: ${sampleData.length}`);
                console.log(`   Cards with imageUrl: ${cardsWithImages}`);
                
                if (sampleData.length > 0) {
                    console.log(`\n📝 Sample images:`);
                    sampleData.filter(c => c.imageUrl).slice(0, 3).forEach(card => {
                        console.log(`   - ${card.name}: ${card.imageUrl}`);
                    });
                }
                
                return sampleData;
            } catch (error) {
                console.error('❌ Error loading CSV:', error);
                return [];
            }
        }

        function syncToCloud() {
            // This function is called after each save
            if (firebaseConfig.projectId === "YOUR_PROJECT_ID") return;
            
            const url = firebaseConfig.databaseURL + '/users/' + userId + '/collection.json';

                // Only save collected state, price, and card URLs — not the full 1025 card dataset
                const collectionState = {};
                allCards.filter(c => c.collected || (c.cardLink && c.cardLink.trim())).forEach(card => {
                    const entry = {};
                    if (card.collected) {
                        entry.collected = true;
                        entry.price = card.price || null;
                    }
                    if (card.cardLink && card.cardLink.trim()) {
                        entry.cardLink = card.cardLink;
                        entry.productId = card.productId || '';
                        entry.imageUrl = card.imageUrl || '';
                        if (card.setName) entry.setName = card.setName;
                        if (card.nmPrices) entry.nmPrices = card.nmPrices;
                    }
                    collectionState[card.id] = entry;
                });

                fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(collectionState)
                }).then(res => {
                    if (res.ok) {
                        console.log('✅ Synced to cloud (' + Object.keys(collectionState).length + ' collected)');
                    } else {
                        console.log('⚠️ Cloud sync: HTTP ' + res.status);
                    }
                }).catch(err => {
                    console.log('⚠️ Cloud sync failed - saved locally');
                });

            if (firebaseConfig.projectId === "YOUR_PROJECT_ID") return Promise.resolve(null);
            
            const url = firebaseConfig.databaseURL + '/users/' + userId + '/collection.json';

                return fetch(url)
                    .then(res => {
                        if (!res.ok) return null;
                        return res.json();
                    })
                    .then(data => {
                        if (data && typeof data === 'object' && Object.keys(data).length > 0) {
                            console.log('✅ Valid cloud data: ' + Object.keys(data).length + ' collected');

        function backfillSetNames() {

                    const parsed = parseSetName(card.cardLink);
                    if (parsed && parsed !== card.setName) {

        async function loadData() {
            if (sampleData.length === 0) {
                await loadPokemonDataFromCSV();
            }

            // Always start with CSV data as base
            allCards = JSON.parse(JSON.stringify(sampleData));

            // Apply localStorage state first as immediate fallback
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const localData = JSON.parse(saved);
                // Build a lookup for fast merging
                const localLookup = {};
                localData.forEach(c => { localLookup[c.id] = c; });
                allCards.forEach(card => {
                    const lc = localLookup[card.id];
                    if (lc) {
                        if (lc.collected) {
                            card.collected = true;
                            card.price = lc.price || null;
                        }
                        if (lc.cardLink) card.cardLink = lc.cardLink;
                        if (lc.productId) card.productId = lc.productId;
                        if (lc.imageUrl) card.imageUrl = lc.imageUrl;
                        if (lc.nmPrices) card.nmPrices = lc.nmPrices;
                        // setName is always re-parsed from URL by backfillSetNames()
                    }
                });
            }

            // Render immediately so the app feels fast
            filteredCards = [...allCards];
            backfillSetNames();
            renderCards();
            updateStats();

            // Then fetch Firebase and merge on top
            if (firebaseConfig.projectId !== "YOUR_PROJECT_ID") {
                loadFromCloud().then(cloudData => {
                    if (cloudData && typeof cloudData === 'object' && Object.keys(cloudData).length > 0) {
                        allCards.forEach(card => {
                            if (cloudData[card.id]) {
                                const cd = cloudData[card.id];
                                if (cd.collected) {
                                    card.collected = true;
                                    card.price = cd.price || null;
                                }
                                // Merge card URL data from cloud
                                if (cd.cardLink) card.cardLink = cd.cardLink;
                                if (cd.productId) card.productId = cd.productId;
                                if (cd.imageUrl) card.imageUrl = cd.imageUrl;
                                if (cd.nmPrices) card.nmPrices = cd.nmPrices;
                                // setName is always re-parsed from URL by backfillSetNames()
                            }
                            // Don't reset cards missing from cloud — they may not have synced yet
                        });
                        console.log('✅ Merged cloud collection: ' + Object.keys(cloudData).length + ' collected');
                        backfillSetNames();
                        filteredCards = [...allCards];
                        renderCards();
                        updateStats();
                        // Save merged state locally
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(allCards));
                        saveToIndexedDB(allCards);
                    }
                }).catch(err => {
                    console.log('Cloud unavailable - using local data');
                });
            }

        function toggleCollected(cardId) {
            const card = allCards.find(c => c.id === cardId);
            if (card) {
                if (!card.collected) {
                    // Asking for price when marking as collected
                    const priceInput = prompt(`How much did you spend on ${card.name}?`, card.price ? card.price.toString() : '');
                    if (priceInput !== null) {
                        const price = parseFloat(priceInput);
                        if (!isNaN(price) && price >= 0) {
                            card.price = price;
                            card.collected = true;
                        } else if (priceInput === '') {
                            // Allow collecting without price
                            card.price = null;
                            card.collected = true;
                        } else {
                            alert('Please enter a valid price');
                            return;
                        }
                    } else {
                        // User cancelled
                        return;
                    }
                } else {
                    // Unmark as collected - clear the price
                    card.collected = false;
                    card.price = null;
                }
                saveData();
                updateStats();
            // Update just this card in filteredCards without reloading
                const filteredCard = filteredCards.find(c => c.id === cardId);
                if (filteredCard) {
                    filteredCard.collected = card.collected;
                    filteredCard.price = card.price;
        }
updateStats();
renderCards();
            }
        }

        function updateStats() {
            const total = allCards.length;
            const collected = allCards.filter(c => c.collected).length;
            const spent = allCards.filter(c => c.price).reduce((sum, c) => sum + (c.price || 0), 0);
            const marketTotal = allCards.reduce((sum, c) => {
                if (c.nmPrices && c.nmPrices.market) return sum + parseFloat(c.nmPrices.market);
                return sum;
            }, 0);
            const progress = total > 0 ? Math.round((collected / total) * 100) : 0;

            document.getElementById('collectedCount').textContent = collected;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('spentAmount').textContent = '$' + spent.toFixed(2);
            document.getElementById('marketValue').textContent = '$' + Math.round(marketTotal).toLocaleString();
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressPercent').textContent = progress + '%';
        }

        // Search dropdown

        ingSearchInput.addEventListener('input', function() {
            const q = this.value.toLowerCase().trim();
            if (q.length < 1) { ingDropdown.classList.remove('open'); return; }

            const matches = allCards
                .map((card, idx) => ({ card, idx }))
                .filter(({ card }) => (card.name || '').toLowerCase().includes(q))
                .slice(0, 10);

            if (!matches.length) {
                ingDropdown.innerHTML = '<div style="padding:14px 16px;color:#8890A4;font-size:13px;">No results</div>';
                ingDropdown.classList.add('open');
                return;
            }

            ingHighlightIdx = -1;
            ingDropdown.innerHTML = matches.map(({ card, idx }, i) => {
                const hasLink = card.cardLink && card.cardLink.trim();
                return `<div class="ing-dd-item${hasLink ? ' has-link' : ''}" data-i="${i}" data-idx="${idx}" onclick="ingPick(${idx})">
                    <span class="ing-dd-id">#${String(card.id).padStart(4,'0')}</span>
                    <span class="ing-dd-name">${card.name}</span>
                    <span class="ing-dd-status">${hasLink ? '✅' : '⬜'}</span>
                </div>`;
            }).join('');
            ingDropdown.classList.add('open');
        });

        ingSearchInput.addEventListener('keydown', function(e) {
            const items = ingDropdown.querySelectorAll('.ing-dd-item');
            if (!items.length || !ingDropdown.classList.contains('open')) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                ingHighlightIdx = Math.min(ingHighlightIdx + 1, items.length - 1);
                items.forEach((el, i) => el.classList.toggle('highlighted', i === ingHighlightIdx));
                if (items[ingHighlightIdx]) items[ingHighlightIdx].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                ingHighlightIdx = Math.max(ingHighlightIdx - 1, 0);
                items.forEach((el, i) => el.classList.toggle('highlighted', i === ingHighlightIdx));
            } else if (e.key === 'Enter' && ingHighlightIdx >= 0) {
                e.preventDefault();
                ingPick(parseInt(items[ingHighlightIdx].dataset.idx));
            } else if (e.key === 'Escape') {
                ingDropdown.classList.remove('open');
            }
        });

        // Auto-extract product ID on paste/input
        function ingExtractProductId(url) {
            const m = url.match(/\/product\/(\d+)/);
            if (m) return m[1];
            const n = url.match(/^(\d{4,})$/);
            return n ? n[1] : null;
        }

        function ingHandleUrlInput() {
            const url = document.getElementById('ingUrlInput').value.trim();
            const infoEl = document.getElementById('ingExtracted');
            if (!url) { infoEl.classList.remove('visible'); ingClearPreviewSilent(); return; }

            const pid = ingExtractProductId(url);
            const prices = parsePricesFromHash(url);
            const priceInfo = prices ? ` • 💰 Prices included` : '';

            if (pid) {
                const imgUrl = ING_IMAGE_BASE + pid + ING_IMAGE_SUFFIX;
                ingPreviewedProductId = pid;
                ingPreviewedUrl = url;
                ingPreviewedImageUrl = imgUrl;
                infoEl.className = 'ing-extracted visible success';
                infoEl.innerHTML = `Product ID: <code>${pid}</code> → loading image...${priceInfo}`;
                ingLoadPreview(imgUrl, pid);
            } else {
                ingPreviewedProductId = null;
                ingPreviewedUrl = url;
                ingPreviewedImageUrl = null;
                infoEl.className = 'ing-extracted visible error';
                infoEl.innerHTML = '⚠️ Could not find a product number in this URL';
                ingClearPreviewSilent();
            }
        }

        function ingLoadPreview(imgUrl, pid) {
            const area = document.getElementById('ingPreview');
            const infoEl = document.getElementById('ingExtracted');
            area.innerHTML = '<div style="color:#60A5FA;font-size:14px;">Loading preview...</div>';
            const img = new Image();
            img.onload = () => {
                area.innerHTML = ''; area.appendChild(img);
                infoEl.innerHTML = `Product ID: <code>${pid}</code> → ✅ Image loaded`;
                document.getElementById('ingApproveBtn').disabled = false;
                document.getElementById('ingClearBtn').disabled = false;
            };
            img.onerror = () => {
                area.innerHTML = '<div style="color:#F87171;font-size:13px;text-align:center;padding:24px;">❌ No image found for this product</div>';
                infoEl.innerHTML = `Product ID: <code>${pid}</code> → ❌ Image not found`;
                infoEl.className = 'ing-extracted visible error';
                document.getElementById('ingApproveBtn').disabled = true;
                document.getElementById('ingClearBtn').disabled = false;
            };
            img.src = imgUrl;
        }

            'chaos-rising': 'Chaos Rising',
            // Promos & Special
            'swsh-promos': 'Promos',
            'sv-promos': 'Promos',
            'sm-promos': 'Promos',
            'xy-promos': 'Promos',
            'bw-promos': 'Promos',
            'dp-promos': 'Promos',
            'pop-series': 'POP Series',
            'best-of-game': 'Best of Game',
            'wizards-black-star-promos': 'Black Star Promos',
            'nintendo-black-star-promos': 'Black Star Promos',
            'mcdonalds-collection': "McDonald's Collection",
        };

        // Parse set name from TCGPlayer URL slug
        function parseSetName(url) {
            if (!url) return null;
            const clean = url.split('?')[0];
            const m = clean.match(/\/product\/\d+\/pokemon-(.+)/i);
            if (!m) return null;
            let parts = m[1].split('-');

            // Strip series prefixes: numbered (sv03, swsh11) or plain abbreviations (me, sv, sm, etc.)
            while (parts.length > 1 && /^[a-z]{1,5}\d+[a-z]?$/i.test(parts[0])) {
                parts = parts.slice(1);
            }
            if (parts.length > 1 && /^(me|sv|sm|xy|bw|dp|ex|hs|swsh|pop)$/i.test(parts[0])) {
                parts = parts.slice(1);
            }

            // Walk backwards to find where the card number starts
            let cutIdx = parts.length;
            for (let i = parts.length - 1; i >= 0; i--) {
                if (/^\d+$/.test(parts[i])) {
                    cutIdx = i;
                } else {
                    break;
                }
            }
            if (cutIdx < 2) return null;

            // Try progressively shorter slug prefixes against the lookup — ONLY return known names
            for (let nameEnd = cutIdx - 1; nameEnd >= 1; nameEnd--) {
                const slug = parts.slice(0, nameEnd).join('-');
                if (SET_NAME_LOOKUP[slug]) return SET_NAME_LOOKUP[slug];
            }

            // No match in lookup — return null (don't show a set name)
            return null;
        }

        // Extract near-mint price data from URL hash fragment
        // Format: #prices=1stEd:7.91,Unlimited:1.33,Market:0.78,LastSale:0.99
        function parsePricesFromHash(url) {
            if (!url) return null;
            const hashIdx = url.indexOf('#prices=');
            if (hashIdx === -1) return null;
            const fragment = url.substring(hashIdx + 8);
            const prices = {};
            fragment.split(',').forEach(pair => {
                const [key, val] = pair.split(':');
                if (key && val) {
                    const num = parseFloat(val);
                    if (!isNaN(num)) {
                        if (key === '1stEd') prices.firstEd = num.toFixed(2);
                        if (key === 'Unlimited') prices.unlimited = num.toFixed(2);
                        if (key === 'Market') prices.market = num.toFixed(2);
                        if (key === 'LastSale') prices.lastSale = num.toFixed(2);
                    }
                }
            });
            return Object.keys(prices).length > 0 ? prices : null;
        }

        // Strip price hash from URL for clean storage
        function stripPriceHash(url) {
            if (!url) return url;
            return url.split('#prices=')[0];
        }

        // Approve — save to allCards + Firebase
        function ingApprove() {
            if (ingSelectedIndex === null || !ingPreviewedUrl) return;
            const card = allCards[ingSelectedIndex];
            
            // Extract prices from hash before stripping it
            const prices = parsePricesFromHash(ingPreviewedUrl);
            if (prices) card.nmPrices = prices;
            
            card.cardLink = stripPriceHash(ingPreviewedUrl);
            if (ingPreviewedProductId) {
                card.productId = ingPreviewedProductId;
                card.imageUrl = ingPreviewedImageUrl;
            }
            // Extract set name from URL
            const setName = parseSetName(card.cardLink);
            if (setName) card.setName = setName;

            // Save to localStorage + Firebase
            saveData();

            // Show "Added to Pokédex" overlay
            const modal = document.getElementById('ingestorModal');
            const existing = modal.querySelector('.ing-confirm-overlay');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.className = 'ing-confirm-overlay';
            overlay.innerHTML = `
                <span class="ico">✨</span>
                <span class="txt">ADDED TO YOUR POKÉDEX!</span>
                <span class="nm">${card.name}</span>
            `;
            modal.appendChild(overlay);
            setTimeout(() => {
                overlay.remove();
                closeIngestor();
            }, 2000);
        }

        // Clear
        function ingClear() {
            document.getElementById('ingUrlInput').value = '';
            ingClearPreviewSilent();
            document.getElementById('ingUrlInput').focus();
        }

        function ingClearPreviewSilent() {
            document.getElementById('ingPreview').innerHTML =
                '<div class="ing-preview-ph"><span class="pb">🔴</span>Paste a URL above — image loads automatically</div>';
            document.getElementById('ingExtracted').classList.remove('visible');
            document.getElementById('ingApproveBtn').disabled = true;
            document.getElementById('ingClearBtn').disabled = true;
            ingPreviewedProductId = null;
            ingPreviewedUrl = null;
            ingPreviewedImageUrl = null;
        }

        // Close ingestor with Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('ingestorOverlay').classList.contains('active')) {
                closeIngestor();
            }
            if (e.key === 'Escape' && document.getElementById('tcgToast').classList.contains('visible')) {
                tcgToastDismiss();
            }
        });

        // TCG Browse Toast
        let tcgToastCardId = null;
        let tcgToastTimer = null;

        function showTcgToast(cardId, cardName) {
            tcgToastCardId = cardId;

            const toast = document.getElementById('tcgToast');
            const input = document.getElementById('tcgToastInput');
            document.getElementById('tcgToastName').textContent = cardName;
            input.value = '';
            toast.classList.add('visible');
            clearTimeout(tcgToastTimer);
            // Auto-focus so paste works immediately when user returns
            setTimeout(() => input.focus(), 400);
        }

        function tcgToastProcessUrl(url) {
            if (!url || tcgToastCardId === null) return;

            const toast = document.getElementById('tcgToast');
            const cardId = tcgToastCardId;
            tcgToastCardId = null;

            // Smooth fade-out: slide down + fade
            toast.style.transition = 'bottom 0.35s ease-in, opacity 0.35s ease-in';
            toast.style.opacity = '0';
            toast.style.bottom = '-200px';

            // After toast animates out, open ingestor
            setTimeout(() => {
                toast.classList.remove('visible');
                toast.style.transition = '';
                toast.style.opacity = '';
                toast.style.bottom = '';

                openIngestorForCard(cardId);

                // Pre-fill the URL and trigger the preview
                setTimeout(() => {
                    const ingInput = document.getElementById('ingUrlInput');
                    if (ingInput) {
                        ingInput.value = url;
                        ingHandleUrlInput();
                    }
                }, 150);
            }, 350);
        }

        function tcgToastDismiss() {
            document.getElementById('tcgToast').classList.remove('visible');
            tcgToastCardId = null;
            clearTimeout(tcgToastTimer);
        }

        // Listen for paste on the toast input
        document.getElementById('tcgToastInput').addEventListener('paste', function() {
            setTimeout(() => {
                const url = this.value.trim();
                if (url) tcgToastProcessUrl(url);
            }, 50);
        });

        document.getElementById('tcgToastInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const url = this.value.trim();
                if (url) tcgToastProcessUrl(url);
            }
        });

        // Global paste — if toast is visible, intercept paste anywhere on the page
        document.addEventListener('paste', function(e) {
            const toast = document.getElementById('tcgToast');
            const input = document.getElementById('tcgToastInput');
            if (tcgToastCardId !== null && toast.classList.contains('visible') && document.activeElement !== input) {
                e.preventDefault();
                const url = (e.clipboardData || window.clipboardData).getData('text').trim();
                if (url) {
                    input.value = url;
                    tcgToastProcessUrl(url);
                }
            }
        });

        // Aggressively focus the toast input whenever the user returns
        function focusToastInput() {
            if (tcgToastCardId !== null) {
                const toast = document.getElementById('tcgToast');
                const input = document.getElementById('tcgToastInput');
                if (toast.classList.contains('visible')) {
                    toast.style.transform = 'translateX(-50%) scale(1.03)';
                    setTimeout(() => { toast.style.transform = 'translateX(-50%)'; }, 200);
                    input.focus();
                }
            }
        }
        document.addEventListener('visibilitychange', () => { if (!document.hidden) focusToastInput(); });
        window.addEventListener('focus', focusToastInput);
        // Also focus when clicking anywhere on the page while toast is up
        document.addEventListener('click', function(e) {
            if (tcgToastCardId !== null && !e.target.closest('.tcg-toast')) {
                focusToastInput();
            }
        });
    </script>
</body>
