// SVG sparkline chart for value history
function renderChart(history) {
  if (!history || history.length < 2) {
    return `<div class="chart-empty">Not enough data yet<br><span class="lcd-faint" style="font-size:11px;">Add cards to start tracking value over time</span></div>`;
  }
  const W = 600, H = 110;
  const pad = 8;
  const values = history.map(h => h.value);
  const min = Math.min(...values, 0);
  const max = Math.max(...values, 1);
  const range = max - min || 1;
  const step = (W - pad * 2) / Math.max(history.length - 1, 1);
  const points = history.map((h, i) => {
    const x = pad + i * step;
    const y = pad + (H - pad * 2) - ((h.value - min) / range) * (H - pad * 2);
    return [x, y];
  });
  const linePath = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const fillPath = linePath + ` L${points[points.length - 1][0].toFixed(1)},${H - pad} L${pad},${H - pad} Z`;
  return `
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(244, 183, 64, 0.25)"/>
          <stop offset="100%" stop-color="rgba(244, 183, 64, 0)"/>
        </linearGradient>
      </defs>
      <!-- Grid lines -->
      ${[0, 0.25, 0.5, 0.75, 1].map(p =>
        `<line x1="0" x2="${W}" y1="${pad + (H - pad * 2) * p}" y2="${pad + (H - pad * 2) * p}" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3,3"/>`
      ).join('')}
      <path d="${fillPath}" fill="url(#chartFill)"/>
      <path d="${linePath}" fill="none" stroke="#F4B740" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" style="filter: drop-shadow(0 0 4px rgba(244, 183, 64, 0.5));"/>
      ${points.map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="#F4B740" stroke="#15171C" stroke-width="1"/>`).join('')}
    </svg>
  `;
}

// ----- DEX VIEW -----
function renderDex(el) {
  const filtered = roster.map(r => ({...r, ...(collection[r.id] || {})})).filter(c => {
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!c.name.toLowerCase().includes(q) && !String(c.id).includes(q)) return false;
    }
    if (genFilter !== "all" && c.generation !== genFilter) return false;
    if (collectedFilter === "collected" && !c.collected) return false;
    if (collectedFilter === "uncollected" && c.collected) return false;
    if (collectedFilter === "no-price" && (!c.collected || c.price)) return false;
    if (collectedFilter === "no-image" && c.imageUrl) return false;
    if (langFilter !== "all") {
      // Default unset language to "english"
      const cardLang = c.language || "english";
      if (cardLang !== langFilter) return false;
    }
    return true;
  });

  el.innerHTML = `
    <div class="dex-controls">
      <input type="text" class="lcd-input" id="searchInput" placeholder="Search by name or number..." value="${searchQuery.replace(/"/g, '&quot;')}">
      <button class="filter-toggle ${filtersOpen ? 'open' : ''} ${activeFilterCount() > 0 ? 'has-active' : ''}" onclick="toggleFilters()" aria-label="Toggle filters">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
        </svg>
        <span>Filters</span>
        ${activeFilterCount() > 0 ? `<span class="filter-count">${activeFilterCount()}</span>` : ''}
      </button>
    </div>

    ${activeFilterCount() > 0 && !filtersOpen ? `
      <div class="active-filter-bar">
        ${renderActiveFilterPills()}
        <button class="clear-all-btn" onclick="clearAllFilters()">Clear all</button>
      </div>
    ` : ''}

    ${filtersOpen ? `
      <div class="filter-panel">
        <div class="filter-group">
          <div class="filter-group-label">Collection</div>
          <div class="filter-chips">
            <button class="chip ${collectedFilter==='all'?'active':''}" onclick="setCollectedFilter('all')">All</button>
            <button class="chip ${collectedFilter==='collected'?'active':''}" onclick="setCollectedFilter('collected')">Collected</button>
            <button class="chip ${collectedFilter==='uncollected'?'active':''}" onclick="setCollectedFilter('uncollected')">Not collected</button>
            <button class="chip warn ${collectedFilter==='no-price'?'active':''}" onclick="setCollectedFilter('no-price')">No Price</button>
            <button class="chip warn ${collectedFilter==='no-image'?'active':''}" onclick="setCollectedFilter('no-image')">No Image</button>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-label">Generation</div>
          <div class="filter-chips">
            <button class="chip ${genFilter==='all'?'active':''}" onclick="setGenFilter('all')">All</button>
            ${[1,2,3,4,5,6,7,8,9].map(g => `<button class="chip ${genFilter===g?'active':''}" onclick="setGenFilter(${g})">Gen ${g}</button>`).join('')}
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-label">Language</div>
          <div class="filter-chips">
            <button class="chip ${langFilter==='all'?'active':''}" onclick="setLangFilter('all')">All</button>
            <button class="chip ${langFilter==='english'?'active':''}" onclick="setLangFilter('english')">English</button>
            <button class="chip ${langFilter==='japanese'?'active':''}" onclick="setLangFilter('japanese')">Japanese</button>
          </div>
        </div>

        ${activeFilterCount() > 0 ? `
          <div style="display:flex; justify-content:flex-end; padding-top:8px; border-top:1px solid var(--screen-border); margin-top:6px;">
            <button class="clear-all-btn" onclick="clearAllFilters()">Clear all filters</button>
          </div>
        ` : ''}
      </div>
    ` : ''}

    ${filtered.length === 0 ? `
      <div class="lcd-empty">
        <div class="lcd-empty-icon">— No Entries —</div>
        <div class="lcd-empty-line">No Pokémon match your search.</div>
        <div class="lcd-empty-sub">Try a different filter or clear search.</div>
      </div>
    ` : `
      <div class="dex-grid">
        ${filtered.map(c => renderDexEntry(c)).join('')}
      </div>
    `}
  `;

  // Wire up search input (preserve focus + cursor)
  const search = document.getElementById("searchInput");
  if (search) {
    search.addEventListener("input", (e) => {
      const cursorPos = e.target.selectionStart;
      searchQuery = e.target.value;
      renderDex(el);
      const newSearch = document.getElementById("searchInput");
      if (newSearch) {
        newSearch.focus();
        newSearch.setSelectionRange(cursorPos, cursorPos);
      }
    });
  }
}

function renderDexEntry(c) {
  const hasImage = !!c.imageUrl;
  const img = hasImage ? c.imageUrl : spriteUrl(c.id);
  const isJapanese = c.language === "japanese";
  return `
    <div class="dex-entry ${c.collected ? 'collected' : ''}" onclick="openCardDetail(${c.id})">
      <span class="dex-id">#${String(c.id).padStart(4, '0')}</span>
      <span class="dex-status ${c.collected ? 'caught' : 'uncaught'}" title="${c.collected ? 'Caught' : 'Not yet caught'}">${c.collected ? '✓' : ''}</span>

}

// ----- RECENT VIEW -----
function renderRecent(el) {
  const recent = Object.entries(collection)
    .filter(([_, c]) => c.collected || c.cardLink)
    .map(([id, c]) => {
      const r = roster.find(x => x.id === parseInt(id));
      return r ? { ...r, ...c } : null;
    })
    .filter(Boolean)
    .sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0))
    .slice(0, 50);

  el.innerHTML = `
    <div class="sys-bar">
      <div class="sys-bar-left">
        <span class="sys-cursor"></span>
        <span>Recent Activity</span>
      </div>
      <div class="sys-bar-right">
        <span class="lcd-glow">${recent.length}</span>
        <span class="lcd-dim">recent</span>
      </div>
    </div>

    ${recent.length === 0 ? `
      <div class="lcd-empty">
        <div class="lcd-empty-icon">— No Activity —</div>
        <div class="lcd-empty-line">Your collection is empty.</div>
        <div class="lcd-empty-sub">Switch to <strong style="color:var(--accent-red);">DEX</strong> and add your first Pokémon!</div>
      </div>
    ` : `
      <div class="recent-list">
        ${recent.map(c => `
          <div class="recent-row" onclick="openCardDetail(${c.id})">
            <img class="recent-img" src="${c.imageUrl || spriteUrl(c.id)}" alt="${c.name}" onerror="this.src='${spriteUrl(c.id)}'">
            <div class="recent-meta">
              <div class="recent-name">#${String(c.id).padStart(4, '0')} · ${c.name}</div>
              <div class="recent-line">
                ${c.collected ? '<span class="lcd-glow">✓ Caught</span>' : '<span class="lcd-dim">◦ Tracked</span>'}
                ${c.price ? `<span class="dot">·</span>$${c.price.toFixed(2)}` : ''}
                ${c.setName ? `<span class="dot">·</span>${c.setName}` : ''}
                ${c.nmPrices?.market ? `<span class="dot">·</span>Mkt $${c.nmPrices.market}` : ''}
              </div>
            </div>
            <div class="recent-stamp">${c.addedAt ? formatStamp(c.addedAt) : ''}</div>
          </div>
        `).join('')}
      </div>
    `}
  `;
}

function formatStamp(ts) {
  const d = new Date(ts);
  const now = new Date();
  const days = Math.floor((now - d) / (1000 * 60 * 60 * 24));
  if (days === 0) return "Today";
  if (days === 1) return "1d ago";
  if (days < 7) return days + "d ago";
  if (days < 30) return Math.floor(days / 7) + "w ago";
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

// ============================================================================
// INTERACTIONS
// ============================================================================
function setView(v) { currentView = v; render(); }
function setGenFilter(g) { genFilter = g; render(); }
function setCollectedFilter(f) { collectedFilter = f; render(); }
function setLangFilter(l) { langFilter = l; render(); }
function toggleFilters() { filtersOpen = !filtersOpen; render(); }

function activeFilterCount() {
  let n = 0;
  if (collectedFilter !== "all") n++;
  if (genFilter !== "all") n++;
  if (langFilter !== "all") n++;
  return n;
}

function renderActiveFilterPills() {
  const pills = [];
  // Collection pill
  if (collectedFilter !== "all") {
    const labels = {
      "collected": "Collected",
      "uncollected": "Not collected",
      "no-price": "No Price",
      "no-image": "No Image",
    };
    const isWarn = collectedFilter === "no-price" || collectedFilter === "no-image";
    pills.push(`<button class="active-pill ${isWarn ? 'warn' : ''}" onclick="setCollectedFilter('all')" title="Remove filter">
      <span class="ap-label">${labels[collectedFilter]}</span>
      <span class="ap-x">✕</span>
    </button>`);
  }
  // Generation pill
  if (genFilter !== "all") {
    pills.push(`<button class="active-pill" onclick="setGenFilter('all')" title="Remove filter">
      <span class="ap-label">Gen ${genFilter}</span>
      <span class="ap-x">✕</span>
    </button>`);
  }
  // Language pill
  if (langFilter !== "all") {
    const label = langFilter === "english" ? "English" : "Japanese";
    pills.push(`<button class="active-pill" onclick="setLangFilter('all')" title="Remove filter">
      <span class="ap-label">${label}</span>
      <span class="ap-x">✕</span>
    </button>`);
  }
  return pills.join("");
}

function clearAllFilters() {
  collectedFilter = "all";
  genFilter = "all";
  langFilter = "all";
  render();
}

function setupTabs() {
  document.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => setView(t.dataset.view));
  });
}

function setupKeyboard() {
  document.addEventListener("keydown", (e) => {
    if (document.querySelector(".modal-overlay")) return; // modals own keys
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "1" || e.key.toLowerCase() === "a") setView("dex");
    else if (e.key === "2" || e.key.toLowerCase() === "b") setView("recent");
    else if (e.key === "3") setView("stats");
    else if (e.key === "/") {
      e.preventDefault();
      setView("dex");
      setTimeout(() => document.getElementById("searchInput")?.focus(), 100);
    }
  });

  // D-pad and A/B buttons — A/B map to their labeled tabs (DEX / RECENT)
  document.querySelectorAll("[data-key]").forEach(btn => {
    btn.addEventListener("click", () => {
      const k = btn.dataset.key;
      if (k === "a") setView("dex");
      else if (k === "b") setView("recent");
      else if (k === "left" || k === "up") {
        const order = ["dex", "recent", "stats"];
        const i = order.indexOf(currentView);
        setView(order[(i - 1 + order.length) % order.length]);
      } else if (k === "right" || k === "down") {
        const order = ["dex", "recent", "stats"];
        const i = order.indexOf(currentView);
        setView(order[(i + 1) % order.length]);
      }
    });
  });
}

// ============================================================================
// MODALS
// ============================================================================
function showModal(html, opts = {}) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay" + (opts.zoom ? " zoom-modal" : "");
  overlay.innerHTML = html;
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeModal();
  });
  document.body.appendChild(overlay);
  // Focus first input
  setTimeout(() => overlay.querySelector("input")?.focus(), 50);
  // ESC to close
  const escHandler = (e) => {
    if (e.key === "Escape") {
      closeModal();
      document.removeEventListener("keydown", escHandler);
    }
  };
  document.addEventListener("keydown", escHandler);
}
function closeModal() {
  document.querySelectorAll(".modal-overlay").forEach(o => o.remove());
}

            </div>
          ` : ''}

            <div class="zoom-pricing-header">Entry #${String(c.id).padStart(4, '0')}</div>
            <div class="zoom-pricing-row"><span>Pokémon</span><span class="val">${c.name}</span></div>
            <div class="zoom-pricing-row"><span>Generation</span><span class="val">${c.generation}</span></div>
            ${c.setName ? `<div class="zoom-pricing-row"><span>Set</span><span class="val">${c.setName}</span></div>` : ''}
            ${c.collected ? `<div class="zoom-pricing-row"><span>Status</span><span class="val">● CAUGHT</span></div>` : ''}

// ----- Catch / Mark collected dialog -----
function catchPrompt(id) {
  closeModal();
  const r = roster.find(c => c.id === id);
  if (!r) return;
  const c = { ...r, ...(collection[id] || {}) };
  openCatchDialog(c);
}

function openCatchDialog(c) {
  showModal(`
    <div class="dialog" onclick="event.stopPropagation()">
      <button class="dialog-close" onclick="closeModal()">✕</button>
      <div class="dialog-title">Catch Pokémon</div>
      <div class="dialog-name-row">
        <span class="dialog-name-id">#${String(c.id).padStart(4, '0')}</span>
        <span class="dialog-name">${c.name}</span>
      </div>
      <div class="dialog-meta">Generation ${c.generation}${c.setName ? ` · ${c.setName}` : ''}</div>
      <div class="dialog-body">
        <p>A wild <strong>${c.name}</strong> appeared!</p>
        <p class="lcd-dim">How much did you spend on this card? Leave blank to skip.</p>
      </div>
      <div class="dialog-section-label">Trainer Wallet</div>
      <div style="position:relative;">
        <span style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--accent-amber); font-size:16px; font-family:'JetBrains Mono', monospace; font-weight:700;">$</span>
        <input type="number" class="dialog-input" id="catchPrice" placeholder="0.00" step="0.01" min="0" style="padding-left: 30px;" value="${c.price || ''}">
      </div>
      <div class="dialog-actions">
        <button class="dialog-btn" onclick="closeModal()">Cancel</button>
        <button class="dialog-btn" onclick="confirmCatch(${c.id}, true)">Skip price</button>
        <button class="dialog-btn primary" onclick="confirmCatch(${c.id}, false)">Catch it!</button>
      </div>
    </div>
  `);
  setTimeout(() => {
    const input = document.getElementById("catchPrice");
    if (input) {
      input.focus();
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") confirmCatch(c.id, false);
      });
    }
  }, 100);
}

function confirmCatch(id, skipPrice) {
  const r = roster.find(c => c.id === id);
  if (!r) return;
  const entry = { ...(collection[id] || {}) };
  entry.collected = true;
  entry.addedAt = entry.addedAt || Date.now();
  entry.lastUpdated = Date.now();
  if (skipPrice) {
    entry.price = null;
  } else {
    const v = parseFloat(document.getElementById("catchPrice")?.value);
    entry.price = !isNaN(v) && v >= 0 ? v : null;
  }
  collection[id] = entry;
  persistCollection(collection);
  recordValueSnapshot();
  closeModal();
  toast(`${r.name} caught!`);
  render();
}

function uncatch(id) {
  const r = roster.find(c => c.id === id);
  if (!r) return;
  if (!confirm(`Release ${r.name} from your Pokédex?`)) return;
  const entry = { ...(collection[id] || {}) };
  delete entry.collected;
  delete entry.price;
  if (Object.keys(entry).length === 0) delete collection[id];
  else collection[id] = entry;
  persistCollection(collection);
  closeModal();
  toast(`${r.name} released`);
  render();
}

// ----- Add Card URL dialog -----

            <span style="color:var(--text-faint); font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600; margin-right:8px;">#${String(p.id).padStart(4,'0')}</span>
            ${p.name}
            <span style="float:right; color:var(--text-faint); font-size:11px; font-family:'JetBrains Mono', monospace; font-weight:600; margin-top:2px;">Gen ${p.generation}</span>

      };

  const r = roster.find(c => c.id === prefilledId);
  if (!r) return;
  const c = { ...r, ...(collection[prefilledId] || {}) };
  showModal(`
    <div class="dialog" id="addDialog" onclick="event.stopPropagation()">
      <button class="dialog-close" onclick="closeModal()">✕</button>
      <div class="dialog-title">Add Card URL</div>
      <div class="dialog-name-row">
        <span class="dialog-name-id">#${String(c.id).padStart(4, '0')}</span>
        <span class="dialog-name">${c.name}</span>
      </div>
      <div class="dialog-meta">Generation ${c.generation}${c.setName ? ` · ${c.setName}` : ''}</div>

      ${c.cardLink ? `
        <div class="dialog-section-label">Current Link</div>
        <div class="dialog-extracted" style="word-break:break-all;">${c.cardLink.length > 70 ? c.cardLink.slice(0,70)+'...' : c.cardLink}</div>
      ` : ''}

      <div class="dialog-section-label">Paste TCGPlayer URL</div>
      <input type="text" class="dialog-input" id="urlInput" placeholder="https://www.tcgplayer.com/product/..." autocomplete="off">
      <div class="dialog-hint">Tip — append <code>#prices=Market:7.91,LastSale:8.50</code> to the URL to also save Near-Mint prices</div>

      <div id="ingPreviewWrap"></div>

      <div class="dialog-actions">
        <button class="dialog-btn" onclick="closeModal()">Cancel</button>
        <button class="dialog-btn danger" id="ingClearBtn" onclick="document.getElementById('urlInput').value=''; updateIngestorPreview(${c.id});" disabled>Clear</button>
        <button class="dialog-btn primary" id="ingApproveBtn" onclick="approveIngestor(${c.id})" disabled>Capture card</button>
      </div>
    </div>
  `);
  setTimeout(() => {
    const input = document.getElementById("urlInput");
    if (input) {
      input.focus();
      input.addEventListener("input", () => updateIngestorPreview(c.id));
      input.addEventListener("paste", () => setTimeout(() => updateIngestorPreview(c.id), 50));
    }
  }, 60);
}

let lastIngestorPreview = null;
function updateIngestorPreview(cardId) {
  const url = document.getElementById("urlInput")?.value.trim();
  const wrap = document.getElementById("ingPreviewWrap");
  const clearBtn = document.getElementById("ingClearBtn");
  const approveBtn = document.getElementById("ingApproveBtn");
  if (!wrap) return;

  if (!url) {
    wrap.innerHTML = `<div class="dialog-preview-ph">Paste a URL above —<br><span style="font-size:11px;">image loads automatically</span></div>`;
    if (clearBtn) clearBtn.disabled = true;
    if (approveBtn) approveBtn.disabled = true;
    lastIngestorPreview = null;
    return;
  }

  const productId = parseProductId(url);
  if (!productId) {
    wrap.innerHTML = `<div class="dialog-preview-ph" style="border-color:var(--accent-red); color:var(--accent-red);">Invalid URL —<br><span style="font-size:11px;">could not extract a TCGPlayer product ID</span></div>`;
    if (clearBtn) clearBtn.disabled = false;
    if (approveBtn) approveBtn.disabled = true;
    lastIngestorPreview = null;
    return;
  }

  const imageUrl = `https://tcgplayer-cdn.tcgplayer.com/product/${productId}_in_1000x1000.jpg`;
  const prices = parsePricesFromHash(url);
  const setName = parseSetName(url);
  const language = parseLanguageFromUrl(url);
  lastIngestorPreview = { url: stripPriceHash(url), productId, imageUrl, prices, setName, language };

  const langPill = language === "japanese"
    ? `<span style="display:inline-block; background:linear-gradient(180deg,#E63946,#B22D38); color:white; padding:1px 7px; border-radius:3px; font-weight:700; letter-spacing:0.5px; margin-left:4px;">JP</span>`
    : `<span style="display:inline-block; background:rgba(77,163,255,0.2); color:var(--accent-blue); padding:1px 7px; border-radius:3px; font-weight:700; letter-spacing:0.5px; margin-left:4px; border:1px solid rgba(77,163,255,0.4);">EN</span>`;

  wrap.innerHTML = `
    <div class="dialog-extracted">
      <strong>PID:</strong> ${productId}
      ${setName ? ` · <strong>SET:</strong> ${setName}` : ''}
      · <strong>LANG:</strong> ${langPill}
      ${prices ? ` · <strong>PRICES:</strong> ${Object.keys(prices).length} found` : ''}
    </div>
    <div class="dialog-preview">
      <img src="${imageUrl}" alt="Preview" onerror="this.parentElement.innerHTML='<div style=\\'color:var(--accent-red); padding:24px; text-align:center; font-size:13px;\\'>Image failed to load</div>';">
    </div>
  `;
  if (clearBtn) clearBtn.disabled = false;
  if (approveBtn) approveBtn.disabled = false;
}

function approveIngestor(cardId) {
  if (!lastIngestorPreview) return;
  const r = roster.find(c => c.id === cardId);
  if (!r) return;
  const entry = { ...(collection[cardId] || {}) };
  entry.cardLink = lastIngestorPreview.url;
  entry.productId = lastIngestorPreview.productId;
  entry.imageUrl = lastIngestorPreview.imageUrl;
  if (lastIngestorPreview.prices) entry.nmPrices = lastIngestorPreview.prices;
  if (lastIngestorPreview.setName) entry.setName = lastIngestorPreview.setName;
  entry.language = lastIngestorPreview.language || entry.language || "english";
  entry.addedAt = entry.addedAt || Date.now();
  entry.lastUpdated = Date.now();
  collection[cardId] = entry;
  persistCollection(collection);
  recordValueSnapshot();

  // "Captured!" splash overlay inside the dialog
  const dialog = document.getElementById("addDialog");
  if (dialog) {
    const splash = document.createElement("div");
    splash.className = "capture-splash";
    splash.innerHTML = `
      <div class="capture-icon">★</div>
      <div class="capture-text">CARD CAPTURED!</div>
      <div class="capture-name">${r.name.toUpperCase()}</div>
    `;
    dialog.style.position = "relative";
    dialog.appendChild(splash);
    setTimeout(() => {
      closeModal();
      render();
    }, 1400);
  } else {
    closeModal();
    render();
  }
}

// ----- Toast -----
let toastTimer = null;
function toast(msg) {
  const existing = document.querySelector(".toast");
  if (existing) existing.remove();
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 2400);
}

// ============================================================================
// IMPORT / EXPORT — migrate from old versions, back up, restore
// ============================================================================

// Export current collection as a downloadable JSON file
function exportCollection() {
  const payload = {
    exportedAt: new Date().toISOString(),
    version: "v10",
    collection,
    valueHistory,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `pokedex-tracker-backup-${new Date().toISOString().split("T")[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("Backup downloaded");
}

function openImportDialog() {
  showModal(`
    <div class="dialog" onclick="event.stopPropagation()">
      <button class="dialog-close" onclick="closeModal()">✕</button>
      <div class="dialog-title">Import Collection</div>
      <div class="dialog-body">
        <p>Paste exported JSON below to restore your collection. Supported formats:</p>
        <ul style="font-size:12px; color:var(--text-dim); margin: 6px 0 12px 18px; line-height:1.7;">
          <li>v10 backup (this app's <strong>Export</strong> output)</li>
          <li>v1 Firebase data — paste the contents of <code style="background:var(--screen-bg-deep); padding:1px 5px; border-radius:3px; font-size:11px;">/users/pokemon_collection/collection.json</code></li>
          <li>Any object mapping card IDs to <code>{ collected, price, cardLink, imageUrl, ... }</code></li>
        </ul>
      </div>
      <div class="dialog-section-label">Collection JSON</div>
      <textarea id="importJsonInput" class="dialog-input" style="min-height:160px; font-family:'JetBrains Mono', monospace; font-size:11px; resize:vertical;" placeholder='Paste your JSON here...'></textarea>

      <div class="dialog-section-label" style="margin-top:14px;">Merge mode</div>
      <div class="filter-chips" style="margin-bottom:14px;">
        <button class="chip active" id="mergeBtnMerge" onclick="setImportMode('merge')">Merge (keep existing)</button>
        <button class="chip warn" id="mergeBtnReplace" onclick="setImportMode('replace')">Replace all</button>
      </div>

      <div class="dialog-actions">
        <button class="dialog-btn" onclick="closeModal()">Cancel</button>
        <button class="dialog-btn primary" onclick="performImport()">Import</button>
      </div>
    </div>
  `);
}

let importMode = "merge";
function setImportMode(mode) {
  importMode = mode;
  const m = document.getElementById("mergeBtnMerge");
  const r = document.getElementById("mergeBtnReplace");
  if (m) m.classList.toggle("active", mode === "merge");
  if (r) r.classList.toggle("active", mode === "replace");
}

function performImport() {
  const text = document.getElementById("importJsonInput")?.value.trim();
  if (!text) { toast("Paste JSON first"); return; }
  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (err) {
    toast("Invalid JSON — check for typos");
    return;
  }

  // Detect shape: v10 backup, v1 Firebase, or raw collection object
  let incomingCollection = null;
  let incomingHistory = null;

  if (parsed && typeof parsed === "object" && parsed.collection && typeof parsed.collection === "object") {
    // v10 backup format
    incomingCollection = parsed.collection;
    incomingHistory = Array.isArray(parsed.valueHistory) ? parsed.valueHistory : null;
  } else if (parsed && typeof parsed === "object") {
    // Heuristic: if values look like card entries, treat the whole thing as a collection
    const sampleKey = Object.keys(parsed)[0];
    const sample = sampleKey ? parsed[sampleKey] : null;
    if (sample && typeof sample === "object" && (
      "collected" in sample || "cardLink" in sample || "imageUrl" in sample ||
      "price" in sample || "nmPrices" in sample
    )) {
      incomingCollection = parsed;
    }
  }

  if (!incomingCollection) {
    toast("Couldn't recognize this JSON format");
    return;
  }

  // Normalize keys to numeric IDs and detect language from cardLink if missing
  const normalized = {};
  let imported = 0;
  let skipped = 0;
  for (const [key, raw] of Object.entries(incomingCollection)) {
    const id = parseInt(key, 10);
    if (isNaN(id) || id < 1 || id > TOTAL_POKEMON) { skipped++; continue; }
    if (!raw || typeof raw !== "object") { skipped++; continue; }
    const entry = {};
    if (raw.collected) entry.collected = true;
    if (typeof raw.price === "number") entry.price = raw.price;
    else if (typeof raw.price === "string" && raw.price.trim()) {
      const p = parseFloat(raw.price);
      if (!isNaN(p)) entry.price = p;
    }
    if (raw.cardLink) entry.cardLink = String(raw.cardLink);
    if (raw.productId) entry.productId = raw.productId;
    if (raw.imageUrl) entry.imageUrl = String(raw.imageUrl);
    if (raw.setName) entry.setName = String(raw.setName);
    if (raw.nmPrices && typeof raw.nmPrices === "object") entry.nmPrices = raw.nmPrices;
    if (raw.language) entry.language = raw.language;
    else if (entry.cardLink) entry.language = parseLanguageFromUrl(entry.cardLink);
    if (raw.addedAt) entry.addedAt = raw.addedAt;
    if (raw.lastUpdated) entry.lastUpdated = raw.lastUpdated;
    // Skip empty entries
    if (Object.keys(entry).length === 0) { skipped++; continue; }
    normalized[id] = entry;
    imported++;
  }

  if (imported === 0) {
    toast("No valid card entries found");
    return;
  }

  // Apply
  if (importMode === "replace") {
    collection = normalized;
  } else {
    // Merge: incoming entries overwrite existing ones field-by-field
    for (const [id, entry] of Object.entries(normalized)) {
      collection[id] = { ...(collection[id] || {}), ...entry };
    }
  }
  persistCollection(collection);

  if (incomingHistory) {
    if (importMode === "replace") valueHistory = incomingHistory;
    else valueHistory = mergeValueHistory(valueHistory, incomingHistory);
    saveLocal(VALUE_HISTORY_KEY, valueHistory);
  }

  recordValueSnapshot();
  closeModal();
  const skipMsg = skipped > 0 ? ` · ${skipped} skipped` : "";
  toast(`Imported ${imported} card${imported === 1 ? "" : "s"}${skipMsg}`);
  render();
}

// Combine two history arrays, deduping by date (most recent value per day wins)
function mergeValueHistory(a, b) {
  const byDate = {};
  for (const e of a) if (e?.date) byDate[e.date] = e;
  for (const e of b) if (e?.date) byDate[e.date] = e;
  return Object.values(byDate).sort((x, y) => x.date.localeCompare(y.date)).slice(-90);
}

// Boot the device
boot();
</script>
