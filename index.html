<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Card Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #e94560;
            --light-gray: #f5f5f5;
            --white: #ffffff;
            --dark-gray: #333333;
            --medium-gray: #888888;
            --light-border: #e0e0e0;
            --success-green: #51cf66;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            height: 100%;
            background-color: #1a1a1a;
            background-attachment: fixed;
        }

        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            color: var(--dark-gray);
            margin: 0;
            padding: 0;
            overflow-y: scroll;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .container {
                max-width: 100%;
                padding: 16px 12px;
            }
        }

        @media (max-width: 430px) {
            .container {
                padding: 12px 10px;
            }
        }

        /* Dark Mode */
        body.dark-mode {
            --light-gray: #1a1a1a;
            --white: #2d2d2d;
            --dark-gray: #e0e0e0;
            --medium-gray: #a0a0a0;
            --light-border: #3a3a3a;
            background-color: var(--light-gray);
        }

        /* Light Mode */
        html.light-mode {
            background-color: #f5f5f5;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--transition);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .reset-button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--transition);
            color: var(--medium-gray);
        }

        .reset-button:hover {
            transform: scale(1.1);
            color: var(--primary-red);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 0;
            border-bottom: 1px solid var(--light-border);
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (min-width: 769px) {
            header {
                flex-wrap: nowrap;
                gap: 30px;
                margin-bottom: 40px;
                padding: 16px 0;
            }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            order: 1;
        }

        @media (min-width: 769px) {
            .header-left {
                gap: 10px;
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0;
        }

        @media (min-width: 769px) {
            .logo {
                gap: 10px;
            }
        }

        .pokeball {
            width: 28px;
            height: 28px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        @media (min-width: 769px) {
            .pokeball {
                width: 32px;
                height: 32px;
            }
        }

        .pokeball svg {
            width: 100%;
            height: 100%;
        }

        .logo-text h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark-gray);
            letter-spacing: -0.3px;
            line-height: 1.1;
        }

        @media (min-width: 769px) {
            .logo-text h1 {
                font-size: 18px;
                line-height: 1.2;
            }
        }

        .logo-text p {
            font-size: 11px;
            color: var(--primary-red);
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: 1;
        }

        @media (min-width: 769px) {
            .logo-text p {
                font-size: 12px;
            }
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            align-items: center;
            margin-left: auto;
            order: 2;
        }

        @media (min-width: 769px) {
            .stats-container {
                display: flex;
                gap: 30px;
                grid-template-columns: unset;
            }
        }

        .stat {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: auto;
        }

        @media (min-width: 769px) {
            .stat {
                min-width: 70px;
            }
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark-gray);
            line-height: 1;
        }

        @media (min-width: 769px) {
            .stat-value {
                font-size: 22px;
            }
        }

        .stat-label {
            font-size: 8px;
            color: var(--medium-gray);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            font-weight: 600;
            margin-top: 2px;
            white-space: nowrap;
        }

        @media (min-width: 769px) {
            .stat-label {
                font-size: 10px;
                letter-spacing: 0.4px;
            }
        }

        .progress-section {
            display: none;
            align-items: center;
            gap: 8px;
            margin-left: 0;
            padding-left: 0;
            border-left: none;
            order: 3;
        }

        @media (min-width: 769px) {
            .progress-section {
                display: flex;
                gap: 10px;
                margin-left: 20px;
                padding-left: 20px;
                border-left: 1px solid var(--light-border);
            }
        }

        .theme-toggle {
            order: 4;
            font-size: 16px;
        }

        @media (min-width: 769px) {
            .theme-toggle {
                font-size: 20px;
            }
        }

        .reset-button {
            order: 5;
            font-size: 14px;
        }

        @media (min-width: 769px) {
            .reset-button {
                font-size: 18px;
            }
        }

        .progress-label {
            font-size: 10px;
            color: var(--medium-gray);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-weight: 600;
            white-space: nowrap;
        }

        .progress-bar {
            width: 80px;
            height: 3px;
            background-color: var(--light-border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-red);
            border-radius: 2px;
            transition: width var(--transition);
        }

        .progress-percent {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary-red);
            min-width: 28px;
            text-align: right;
        }

        /* Filter Section */
        .filter-toggle-section {
            margin-bottom: 20px;
        }

        .filter-toggle-btn {
            padding: 12px 18px;
            border: 2px solid var(--primary-red);
            background-color: var(--white);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-red);
            cursor: pointer;
            transition: all var(--transition);
            width: 100%;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .filter-toggle-btn:hover {
            background-color: var(--primary-red);
            color: var(--white);
        }

        .filter-section {
            display: none;
            padding: 16px;
            background-color: var(--white);
            border-radius: 8px;
            border: 1px solid var(--light-border);
            margin-top: 12px;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        }

        .filter-section.active {
            display: grid;
        }

        .filter-section.active .search-container {
            grid-column: 1 / -1;
        }

        .search-container {
            display: flex;
        }

        .filter-button {
            padding: 8px 18px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            background-color: var(--white);
            color: var(--dark-gray);
            border: 1px solid var(--light-border);
        }

        .filter-button.active {
            background-color: var(--primary-red);
            color: var(--white);
            border-color: var(--primary-red);
        }

        .filter-button:hover:not(.active) {
            border-color: var(--dark-gray);
        }

        .filter-spacer {
            width: 1px;
            height: 24px;
            background-color: var(--light-border);
            margin: 0 8px;
        }

        .search-container {
            display: flex;
            align-items: center;
            margin-left: auto;
        }

        .search-box {
            background-color: var(--white);
            border: 1px solid var(--light-border);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            color: var(--dark-gray);
            width: 200px;
            transition: border-color var(--transition);
        }

        .search-box::placeholder {
            color: var(--medium-gray);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary-red);
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        @media (min-width: 769px) {
            .card-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
        }

        @media (min-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 20px;
            }
        }

        @media (min-width: 1400px) {
            .card-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 20px;
            }
        }

        .card {
            background-color: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        .card-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 63 / 88;
            background-color: var(--light-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
            transition: transform var(--transition);
        }

        .card-image-wrapper:hover {
            transform: scale(1.02);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition);
            border-radius: 6px;
        }

        .card:hover .card-image {
            transform: scale(1.03);
        }

        .card-image-placeholder {
            color: var(--medium-gray);
            font-size: 14px;
            text-align: center;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition);
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 600px;
            height: 90vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-image-container {
            width: 100%;
            height: 100%;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }

        .modal-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            cursor: zoom-in;
        }

        .modal-image.zoomed {
            cursor: zoom-out;
            width: auto;
            height: auto;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 28px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
            z-index: 1001;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 16px;
            border-radius: 6px;
            z-index: 1001;
        }

        .card-content {
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-number {
            font-size: 10px;
            color: var(--medium-gray);
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .card-generation {
            font-size: 9px;
            color: var(--medium-gray);
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .card-price {
            font-size: 11px;
            color: var(--primary-red);
            font-weight: 700;
            margin-top: 4px;
        }

        .card-price-display {
            border: 2px solid var(--primary-red);
            border-radius: 6px;
            padding: 8px;
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-red);
            text-align: center;
            margin: 8px 0;
            background-color: rgba(233, 69, 96, 0.05);
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark-gray);
            margin: 2px 0;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .mark-collected-btn {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--light-border);
            background-color: var(--white);
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            color: var(--dark-gray);
            cursor: pointer;
            transition: all var(--transition);
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mark-collected-btn:hover {
            border-color: var(--primary-red);
            color: var(--primary-red);
        }

        .mark-collected-btn.collected {
            background-color: var(--success-green);
            color: var(--white);
            border-color: var(--success-green);
        }

        .tcg-link-btn {
            padding: 10px 12px;
            border: 1px solid var(--primary-red);
            background-color: var(--white);
            color: var(--primary-red);
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .tcg-link-btn:hover {
            background-color: var(--primary-red);
            color: var(--white);
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--medium-gray);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--dark-gray);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .stats-container {
                width: 100%;
                margin-left: 0;
                justify-content: space-between;
            }

            .progress-section {
                margin-left: 0;
                padding-left: 0;
                border-left: none;
            }

            .filter-section {
                flex-direction: column;
                align-items: flex-start;
            }

            .search-container {
                width: 100%;
                margin-left: 0;
            }

            .search-box {
                width: 100%;
            }

            .filter-spacer {
                display: none;
            }

            .card-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .card-content {
                padding: 12px;
            }

            .card-title {
                font-size: 14px;
            }

            .card-number {
                font-size: 10px;
            }

            .card-generation {
                font-size: 10px;
            }

            .mark-collected-btn {
                font-size: 11px;
                padding: 6px 8px;
            }

            .tcg-link-btn {
                font-size: 11px;
                padding: 6px 8px;
            }
        }

        /* iPhone 16 Pro Max specific (430px) */
        @media (max-width: 430px) {
            .container {
                padding: 12px 10px;
            }

            header {
                margin-bottom: 16px;
                padding: 10px 0;
            }

            .stats-container {
                gap: 8px;
            }

            .stat-value {
                font-size: 15px;
            }

            .stat-label {
                font-size: 7px;
            }

            .logo-text h1 {
                font-size: 15px;
            }

            .logo-text p {
                font-size: 10px;
            }

            .filter-toggle-section {
                margin-bottom: 16px;
            }

            .card-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .card-content {
                padding: 8px 6px;
                gap: 6px;
            }

            .card-title {
                font-size: 13px;
                margin: 1px 0;
            }

            .card-number {
                font-size: 9px;
            }

            .card-generation {
                font-size: 8px;
            }

            .card-price-display {
                padding: 6px;
                font-size: 14px;
                margin: 6px 0;
            }

            .card-actions {
                gap: 6px;
            }

            .mark-collected-btn {
                font-size: 11px;
                padding: 8px 10px;
                min-height: 40px;
            }

            .tcg-link-btn {
                font-size: 11px;
                padding: 8px 10px;
                min-height: 40px;
            }

            .filter-toggle-btn {
                font-size: 13px;
                padding: 10px 14px;
                min-height: 44px;
            }

            .filter-button {
                font-size: 12px;
                padding: 10px 14px;
                min-height: 44px;
            }

            .search-box {
                font-size: 13px;
                padding: 10px 12px;
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo">
                    <div class="pokeball">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <style>
                                    .pokeball-outer { fill: none; stroke: #000; stroke-width: 2.5; }
                                    .pokeball-red { fill: #dc3545; }
                                    .pokeball-white { fill: #ffffff; }
                                    .pokeball-line { stroke: #000; stroke-width: 2.5; }
                                    .pokeball-center-circle { fill: #ffffff; stroke: #000; stroke-width: 2.5; }
                                    .pokeball-center-dot { fill: #dc3545; }
                                    
                                    body.dark-mode .pokeball-outer,
                                    body.dark-mode .pokeball-line,
                                    body.dark-mode .pokeball-center-circle { stroke: #e0e0e0; }
                                    body.dark-mode .pokeball-center-circle { fill: #2d2d2d; }
                                </style>
                            </defs>
                            <!-- Outer circle -->
                            <circle cx="50" cy="50" r="48" class="pokeball-outer"/>
                            <!-- Red top half -->
                            <path d="M 2 50 A 48 48 0 0 1 98 50" class="pokeball-red"/>
                            <!-- White bottom half -->
                            <path d="M 2 50 A 48 48 0 0 0 98 50" class="pokeball-white"/>
                            <!-- Center dividing line -->
                            <line x1="2" y1="50" x2="98" y2="50" class="pokeball-line"/>
                            <!-- Center white circle -->
                            <circle cx="50" cy="50" r="13" class="pokeball-center-circle"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>Pokédex</h1>
                        <p>Card Tracker</p>
                    </div>
                </div>
            </div>

            <div class="stats-container">
                <div class="stat">
                    <div class="stat-value" id="collectedCount">0</div>
                    <div class="stat-label">Collected</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="spentAmount">$0.00</div>
                    <div class="stat-label">Spent</div>
                </div>
                <div class="progress-section">
                    <div class="progress-label">Progress</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-percent" id="progressPercent">0%</div>
                </div>
                <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
                <button class="reset-button" id="resetButton" title="Reset all data">⟲</button>
            </div>
        </header>

        <div class="filter-toggle-section">
            <button class="filter-toggle-btn" id="filterToggle">🔽 Filters</button>
            <div class="filter-section" id="filterSection">
                <button class="filter-button active" data-filter="all">All</button>
                <button class="filter-button" data-filter="collected">Collected</button>
                <button class="filter-button" data-filter="missing">Missing</button>
                <div class="filter-spacer"></div>
                <button class="filter-button active" data-filter="gen-all">All Gens</button>
                <button class="filter-button" data-filter="gen-1">Gen 1</button>
                <button class="filter-button" data-filter="gen-2">Gen 2</button>

                <div class="search-container">
                    <input type="text" class="search-box" id="searchBox" placeholder="Search Pokémon...">
                </div>

        ];

        // Firebase Configuration
        const firebaseConfig = {
            projectId: "pokemon-card-tracker-2b5f8",
            databaseURL: "https://pokemon-card-tracker-2b5f8-default-rtdb.firebaseio.com"
        };

        let db = null;
        let userId = null;

        // Initialize Firebase REST API (no CDN needed, no module errors)
        function initFirebase() {
            // Generate a unique user ID for this device
            userId = localStorage.getItem('pokemonTrackerUserId');
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('pokemonTrackerUserId', userId);
            }
            
            // If you have a proper Firebase project, this will sync
            if (firebaseConfig.projectId !== "YOUR_PROJECT_ID") {
                console.log('Firebase configured for user:', userId);
                syncToCloud();
            } else {
                console.log('Firebase not configured - using localStorage only');
            }
        }

        function syncToCloud() {
            // This function is called after each save
            if (firebaseConfig.projectId === "YOUR_PROJECT_ID") return;
            
            const url = firebaseConfig.databaseURL + '/users/' + userId + '/collection.json';
            
            fetch(url, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(allCards)
            }).then(res => {
                if (!res.ok) {
                    console.log('Cloud sync: HTTP ' + res.status + ' - check database rules');
                }
            }).catch(err => {
                console.log('Cloud sync failed (offline or rules issue)');
            });
        }

        function loadFromCloud() {
            if (firebaseConfig.projectId === "YOUR_PROJECT_ID") return Promise.resolve(null);
            
            const url = firebaseConfig.databaseURL + '/users/' + userId + '/collection.json';
            
            return fetch(url)
                .then(res => {
                    if (!res.ok) {
                        console.log('Cloud load: HTTP ' + res.status + ' - falling back to localStorage');
                        return null;
                    }
                    return res.json();
                })
                .then(data => data)
                .catch(err => {
                    console.log('Cloud load failed - using localStorage');
                    return null;
                });
        }

        // Initialize

        function initializeApp() {
            initFirebase();
            setupEventListeners();
            loadData();
        }

        function loadData() {
            // Try to load from cloud first
            if (firebaseConfig.projectId !== "YOUR_PROJECT_ID") {
                loadFromCloud().then(cloudData => {
                    if (cloudData && Array.isArray(cloudData)) {
                        allCards = cloudData;
                        console.log('✅ Loaded from cloud');
                    } else {
                        loadLocal();
                        console.log('Cloud empty - using localStorage');
                    }
                    filteredCards = [...allCards];
                    renderCards();
                    updateStats();
                }).catch(err => {
                    console.log('Cloud load error - using localStorage');
                    loadLocal();
                    filteredCards = [...allCards];
                    renderCards();
                    updateStats();
                });
            } else {
                loadLocal();
                filteredCards = [...allCards];
                renderCards();
                updateStats();
            }
        }

        function loadLocal() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                allCards = JSON.parse(saved);
            } else {
                allCards = JSON.parse(JSON.stringify(sampleData));
            }
        }

        function saveData() {
            // Always save to localStorage first
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allCards));
            
            // Also sync to cloud
            syncToCloud();
        }

        function setupEventListeners() {
            // Filter buttons
            document.querySelectorAll('.filter-button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const filter = btn.dataset.filter;
                    
                    if (filter.startsWith('gen-')) {
                        document.querySelectorAll('[data-filter^="gen-"]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentFilters.generation = filter;
                    } else {
                        document.querySelectorAll('[data-filter^="collected"], [data-filter^="missing"], [data-filter="all"]').forEach(b => {
                            if (!b.dataset.filter.startsWith('gen-')) b.classList.remove('active');
                        });
                        btn.classList.add('active');
                        currentFilters.collection = filter;
                    }
                    applyFilters();
                });
            });

            // Search
            document.getElementById('searchBox').addEventListener('input', (e) => {
                currentFilters.search = e.target.value.toLowerCase();
                applyFilters();
            });
        }

        function applyFilters() {
            filteredCards = allCards.filter(card => {
                // Collection filter
                if (currentFilters.collection === 'collected' && !card.collected) return false;
                if (currentFilters.collection === 'missing' && card.collected) return false;

                // Generation filter
                if (currentFilters.generation !== 'gen-all') {
                    const gen = parseInt(currentFilters.generation.split('-')[1]);
                    if (card.generation !== gen) return false;
                }

                // Search filter
                if (currentFilters.search) {
                    const search = currentFilters.search;
                    if (!card.name.toLowerCase().includes(search) && !card.id.toString().includes(search)) {
                        return false;
                    }
                }

                return true;
            });

            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('cardGrid');

            if (filteredCards.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <h2>No cards found</h2>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredCards.map(card => `
                <div class="card">
                    <div class="card-image-wrapper" onclick="openImageModal('${card.imageUrl}', '${card.name}', ${card.id})">
                        ${card.imageUrl ? 
                            `<img src="${card.imageUrl}" alt="${card.name}" class="card-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                             <div class="card-image-placeholder" style="display:none;">📷</div>` 
                            : 
                            `<div class="card-image-placeholder">📷</div>`
                        }
                    </div>
                    <div class="card-content">
                        <div class="card-header">
                            <div>
                                <div class="card-number">#${String(card.id).padStart(3, '0')}</div>
                                <div class="card-title">${card.name}</div>
                                <div class="card-generation">Gen ${card.generation}</div>
                            </div>
                        </div>
                        ${card.collected && card.price ? `<div class="card-price-display">$${card.price.toFixed(2)}</div>` : ''}
                        <div class="card-actions">
                            <button class="mark-collected-btn ${card.collected ? 'collected' : ''}" onclick="toggleCollected(${card.id})">
                                ${card.collected ? '✓ Collected' : 'Mark collected'}
                            </button>
                            <a href="${card.cardLink}" target="_blank" rel="noopener noreferrer" class="tcg-link-btn">TCG</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleCollected(cardId) {
            const card = allCards.find(c => c.id === cardId);
            if (card) {
                if (!card.collected) {
                    // Asking for price when marking as collected
                    const priceInput = prompt(`How much did you spend on ${card.name}?`, card.price ? card.price.toString() : '');
                    if (priceInput !== null) {
                        const price = parseFloat(priceInput);
                        if (!isNaN(price) && price >= 0) {
                            card.price = price;
                            card.collected = true;
                        } else if (priceInput === '') {
                            // Allow collecting without price
                            card.price = null;
                            card.collected = true;
                        } else {
                            alert('Please enter a valid price');
                            return;
                        }
                    } else {
                        // User cancelled
                        return;
                    }
                } else {
                    // Unmark as collected - clear the price
                    card.collected = false;
                    card.price = null;
                }
                saveData();
                updateStats();
                applyFilters();
            }
        }

        function updateStats() {
            const total = allCards.length;
            const collected = allCards.filter(c => c.collected).length;
            const spent = allCards.filter(c => c.price).reduce((sum, c) => sum + (c.price || 0), 0);
            const progress = total > 0 ? Math.round((collected / total) * 100) : 0;

            document.getElementById('collectedCount').textContent = collected;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('spentAmount').textContent = '$' + spent.toFixed(2);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressPercent').textContent = progress + '%';
        }

        // Start the app
        function init() {
            initializeApp();
        }

        init();

        // Filter toggle
        document.getElementById('filterToggle').addEventListener('click', () => {
            const filterSection = document.getElementById('filterSection');
            const btn = document.getElementById('filterToggle');
            filterSection.classList.toggle('active');
            btn.textContent = filterSection.classList.contains('active') ? '🔼 Filters' : '🔽 Filters';
        });

        // Modal and zoom functions
        function openImageModal(imageUrl, cardName, cardId) {
            if (!imageUrl) return;
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            const modalInfo = document.getElementById('modalInfo');
            const modalContainer = document.getElementById('modalImageContainer');
            
            modalImage.src = imageUrl;
            modalImage.alt = cardName;
            modalImage.className = 'modal-image';
            modalInfo.textContent = `#${String(cardId).padStart(3, '0')} ${cardName} • Click to zoom`;
            
            modal.classList.add('active');
            
            // Zoom functionality
            modalImage.onclick = (e) => {
                e.stopPropagation();
                modalImage.classList.toggle('zoomed');
                if (modalImage.classList.contains('zoomed')) {
                    modalContainer.style.overflow = 'auto';
                } else {
                    modalContainer.style.overflow = 'auto';
                }
            };
            
            // Close modal when clicking outside image
            modal.onclick = (e) => {
                if (e.target === modal) {
                    closeImageModal();
                }
            };
        }

        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
        }

        // Dark mode toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            document.documentElement.classList.toggle('light-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('pokemonTrackerDarkMode', isDarkMode);
            
            const toggle = document.getElementById('themeToggle');
            toggle.textContent = isDarkMode ? '☀️' : '🌙';
        });

        // Load dark mode preference (default to dark mode)
        const savedDarkMode = localStorage.getItem('pokemonTrackerDarkMode');
        const isDarkMode = savedDarkMode === null ? true : savedDarkMode === 'true';
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
            document.documentElement.classList.remove('light-mode');
            document.getElementById('themeToggle').textContent = '☀️';
        } else {
            document.body.classList.remove('dark-mode');
            document.documentElement.classList.add('light-mode');
            document.getElementById('themeToggle').textContent = '🌙';
        }

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeImageModal();
            }
        });

        // Reset button with confirmation
        document.getElementById('resetButton').addEventListener('click', () => {
            const userInput = prompt('Type "RESET" to clear all data and reset your collection:');
            if (userInput === 'RESET') {
                localStorage.removeItem(STORAGE_KEY);
                allCards = [];
                loadData();
                renderCards();
                updateStats();
                alert('✓ All data has been reset!');
            } else if (userInput !== null) {
                alert('Incorrect. No changes made.');
            }
        });
    </script>
</body>
</html>
